<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kakashi Game built with Phaser and Vite.">
  <title>Kakashi Game</title>
  <script async src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
  <div id="game"></div>
  <script>
    window.addEventListener("error", function(e) {
      var d = document.createElement("div");
      d.style.cssText = "position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-size:24px;border:5px solid yellow;";
      d.innerText = e.message + " at " + e.filename + ":" + e.lineno;
      document.body.appendChild(d);
    });
    window.addEventListener("unhandledrejection", function(e) {
      var d = document.createElement("div");
      d.style.cssText = "position:fixed;top:100px;left:0;z-index:9999;background:red;color:white;padding:20px;font-size:24px;border:5px solid yellow;";
      d.innerText = "Unhandled Promise: " + (e.reason ? (e.reason.message || e.reason) : "Unknown");
      document.body.appendChild(d);
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
